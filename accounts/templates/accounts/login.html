{% extends 'eventi/base.html' %}
{% block title %}Accedi - Cinema{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4 bg-white mt-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Accedi al Cinema</h2>
                <p class="text-muted small">Inserisci le tue credenziali</p>
            </div>
            {% if form.errors %}
                <div class="alert alert-danger p-2 small" role="alert">Username o password non corretti.</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold text-dark">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-dark">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Accedi</button>
            </form>
            <div class="text-center mt-3">
                <p class="text-muted small mb-0">Non hai un account? <a href="{% url 'signup' %}" class="text-danger fw-bold">Registrati qui</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
