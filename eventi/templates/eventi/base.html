<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Eventi Cinematografici{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body { background-color: #1E40AF; color: #ffffff; font-family: 'Arial', sans-serif; }
        .cinema-header { font-size: 5rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; border-bottom: 5px solid #ffffff; margin-bottom: 2rem; display: inline-block; width: 100%; }
        .top-nav { padding: 1rem 0; text-align: right; }
        .top-nav a, .top-nav button { color: #ffffff; text-decoration: none; font-weight: bold; margin-left: 20px; background: none; border: none; }
        .top-nav a:hover { text-decoration: underline; }
        .movie-card { background: none; border: white; transition: transform 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-title { color: #ffffff; text-decoration: none; font-size: 1.2rem; font-weight: bold; display: block; margin-top: 10px; }
        .movie-title:hover { text-decoration: underline; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="{% url 'eventi:event_list' %}">HOME</a>
            {% if user.is_authenticated %}
                <a href="{% url 'eventi:user_profile' %}"> {{ user.username|upper }}</a>
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit">LOGOUT</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">ACCEDI</a>
                <a href="{% url 'signup' %}">REGISTRATI</a>
            {% endif %}
        </div>

        <header class="text-center">
            <h1 class="cinema-header">Eventi Cinematografici</h1>
        </header>

        {% if messages %}
        <div class="mt-3">
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} text-center fw-bold" role="alert">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
