{% extends 'eventi/base.html' %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card shadow border-0 p-4 bg-white mt-4 text-dark">
    <div class="text-center mb-4">
        <h2 class="fw-bold">Gestione Evento</h2>
        <p class="text-muted small">Inserisci o modifica i dettagli dell'evento</p>
    </div>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label small fw-bold">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold mt-2">SALVA EVENTO</button>
    </form>
</div>
</div>
</div>
{% endblock %}
